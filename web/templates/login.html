<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>remote-vm — login</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0b1020;
        color: #e6e8f5;
      }
      form {
        background: #161b2c;
        padding: 2rem 2.25rem;
        border-radius: 12px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        width: 320px;
      }
      h1 {
        margin: 0 0 1.25rem;
        font-size: 1.25rem;
        letter-spacing: 0.4px;
      }
      label {
        display: block;
        font-size: 0.8rem;
        text-transform: uppercase;
        opacity: 0.7;
        margin: 0.75rem 0 0.25rem;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        background: #0b1020;
        border: 1px solid #2a3149;
        color: #e6e8f5;
        border-radius: 8px;
        padding: 0.6rem 0.75rem;
        font-size: 1rem;
      }
      input:focus {
        outline: 2px solid #5b8cff;
        outline-offset: 1px;
      }
      button {
        margin-top: 1.25rem;
        width: 100%;
        padding: 0.65rem 0.75rem;
        background: #4a7fff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #3d6fee;
      }
      .error {
        margin-top: 1rem;
        padding: 0.6rem 0.8rem;
        background: rgba(255, 82, 96, 0.15);
        border: 1px solid rgba(255, 82, 96, 0.4);
        color: #ffb3b9;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <form method="post" action="/login" autocomplete="on">
      <h1>remote-vm</h1>
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required autofocus />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />
      <button type="submit">Sign in</button>
      {% if error %}
      <div class="error">Invalid credentials.</div>
      {% endif %}
    </form>
  </body>
</html>
