name: remote-vm

x-fibe.gg:
  metadata:
    description: Browser-accessible Ubuntu 24.04 remote VM with SSH isolated behind a FastAPI/xterm gateway, iframe-ready cookies, CSP frame ancestors, and hot-reloadable gateway source.
    category: Development
  variables:
    subdomain:
      name: Subdomain
      required: false
      default: remote-vm
      validation: "/^(@|[a-z0-9]+(-[a-z0-9]+)*)$/"
      path: services.web.labels.fibe.gg/subdomain
    branch:
      name: Git branch
      required: false
      default: main
    web_password:
      name: Web terminal password
      required: false
      random: true
      sensitive: true
    ssh_password:
      name: VM SSH password
      required: false
      random: true
      sensitive: true
    session_secret:
      name: Session signing secret
      required: false
      random: true
      sensitive: true

services:
  # ---------------------------------------------------------------------
  # Ubuntu 24.04 SSH server. Port 22 is NOT published to the host —
  # only the auth-gated FastAPI gateway can reach it (over the internal network).
  # ---------------------------------------------------------------------
  remote-vm:
    build:
      context: .
      dockerfile: Dockerfile.vm

    hostname: remote-vm
    init: true
    restart: unless-stopped

    environment:
      VM_USER: ${SSH_USER:-dev}
      VM_PASSWORD: ${SSH_PASSWORD:-devpass}

    configs:
      - source: remote_entrypoint
        target: /run/configs/remote-entrypoint.sh
        mode: 0444
      - source: sshd_config
        target: /run/configs/sshd_config
        mode: 0444

    command: ["bash", "/run/configs/remote-entrypoint.sh"]

    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 22"]
      interval: 3s
      timeout: 2s
      retries: 30
      start_period: 5s

    # No host port published intentionally — gated by `web`.
    expose:
      - "22"

    volumes:
      - remote_etc:/etc
      - remote_usr:/usr
      - remote_var:/var
      - remote_opt:/opt
      - remote_root:/root
      - remote_home:/home

    networks:
      - vmnet

    labels:
      fibe.gg/repo_url: "https://github.com/fibegg/remote-vm"
      fibe.gg/dockerfile: "Dockerfile.vm"
      fibe.gg/branch: ${BRANCH:-main}
      fibe.gg/source_mount: "/workspace"
      fibe.gg/production: "false"

  # ---------------------------------------------------------------------
  # FastAPI gateway: login form + signed-cookie session,
  # WebSocket → asyncssh bridge piped into xterm.js.
  # ---------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    image: remote-vm-web:dev
    init: true
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=128m,mode=1777
    working_dir: /workspace/web
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "7681", "--reload", "--proxy-headers", "--forwarded-allow-ips=*"]

    depends_on:
      remote-vm:
        condition: service_healthy

    environment:
      WEB_USER: ${WEB_USER:-admin}
      WEB_PASSWORD: ${WEB_PASSWORD:-changeme}
      SSH_HOST: remote-vm
      SSH_PORT: "22"
      SSH_USER: ${SSH_USER:-dev}
      SSH_PASSWORD: ${SSH_PASSWORD:-devpass}
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-change-me}
      COOKIE_NAME: ${COOKIE_NAME:-rvm_session}
      COOKIE_MAX_AGE_SECONDS: ${COOKIE_MAX_AGE_SECONDS:-28800}
      COOKIE_SECURE: ${COOKIE_SECURE:-auto}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_PARTITIONED: ${COOKIE_PARTITIONED:-false}
      CSP_MODE: ${CSP_MODE:-enforce}
      FRAME_ANCESTORS: ${FRAME_ANCESTORS:-self}
      STATIC_CACHE_SECONDS: ${STATIC_CACHE_SECONDS:-3600}

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:7681/healthz').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

    ports:
      # Bind to localhost only — same convention as the original ttyd reference.
      - "127.0.0.1:${WEB_PORT:-7681}:7681"

    networks:
      - vmnet

    labels:
      fibe.gg/repo_url: "https://github.com/fibegg/remote-vm"
      fibe.gg/expose: "external:7681"
      fibe.gg/dockerfile: "web/Dockerfile"
      fibe.gg/branch: ${BRANCH:-main}
      fibe.gg/source_mount: "/workspace"
      fibe.gg/env_file: ".env.example"
      fibe.gg/start_command: "uvicorn app:app --host 0.0.0.0 --port 7681 --reload --proxy-headers --forwarded-allow-ips=*"
      fibe.gg/subdomain: "remote-vm"
      fibe.gg/zerodowntime: "false"

configs:
  sshd_config:
    content: |
      Port 22
      ListenAddress 0.0.0.0

      PermitRootLogin no
      PasswordAuthentication yes
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      PubkeyAuthentication no

      UsePAM yes
      PrintMotd no
      X11Forwarding no
      AllowTcpForwarding yes
      PermitTunnel no

      AcceptEnv LANG LC_*
      Subsystem sftp /usr/lib/openssh/sftp-server

  remote_entrypoint:
    # Note: $$ escapes literal $ for docker-compose interpolation,
    # so the running script sees a real $VAR in bash.
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      : "$${VM_USER:=dev}"
      : "$${VM_PASSWORD:=devpass}"

      mkdir -p /run/sshd
      chmod 0755 /run/sshd

      ssh-keygen -A

      cp /run/configs/sshd_config /etc/ssh/sshd_config
      chmod 0644 /etc/ssh/sshd_config

      if ! id -u "$${VM_USER}" >/dev/null 2>&1; then
        useradd -m -s /bin/bash "$${VM_USER}"
      fi

      echo "$${VM_USER}:$${VM_PASSWORD}" | chpasswd
      usermod -aG sudo "$${VM_USER}"

      printf '%s ALL=(ALL) NOPASSWD:ALL\n' "$${VM_USER}" > /etc/sudoers.d/90-vm-user
      chmod 0440 /etc/sudoers.d/90-vm-user

      mkdir -p "/home/$${VM_USER}/workspace"
      chown -R "$${VM_USER}:$${VM_USER}" "/home/$${VM_USER}"

      # Refresh apt index in the background on first boot — the build wiped /var/lib/apt/lists,
      # and the named volume on /var would otherwise serve stale (empty) state. Best-effort:
      # if there's no network yet, the user can always re-run `sudo apt update`.
      if [ ! -d /var/lib/apt/lists/partial ] || [ -z "$$(ls -A /var/lib/apt/lists 2>/dev/null | grep -v partial || true)" ]; then
        ( apt-get update >/var/log/first-boot-apt-update.log 2>&1 || true ) &
      fi

      cat >/etc/profile.d/remote-vm-help.sh <<'EOF_HELP'
      echo
      echo "Remote Ubuntu-in-Docker VM (Ubuntu 24.04, main+universe+multiverse+restricted enabled)"
      echo "Try:"
      echo "  sudo apt update && sudo apt install -y python3 imagemagick"
      echo "  sudo add-apt-repository ppa:deadsnakes/ppa"
      echo "  curl -I https://example.com"
      echo
      EOF_HELP

      exec /usr/sbin/sshd -D -e -f /etc/ssh/sshd_config

networks:
  vmnet:

volumes:
  remote_etc:
  remote_usr:
  remote_var:
  remote_opt:
  remote_root:
  remote_home:
